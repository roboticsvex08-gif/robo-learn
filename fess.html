<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robo Learn</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
    overflow-x:hidden;
}

/* WATERMARK */
.watermark{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.08;
    z-index:-1;
}

/* LOGO */
.logo-transparent {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 1000;
    background: rgba(255,255,255,0.0);
    border-radius: 12px;
    padding: 0;
    box-shadow: none;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-transparent img {
    height: 60px;
    background: transparent;
}

/* HERO SECTION */
.hero{
    position:relative;
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("kjkj.jpeg");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    padding-left:100px;
    color:white;
}

.hero-content{
    max-width:700px;
}

.hero h1{
    font-size:80px;
    line-height:1.1;
    margin-bottom:20px;
    font-weight:900;
}

.hero p{
    font-size:24px;
    margin-bottom:40px;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    padding:18px 40px;
    border:none;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    transition:0.3s;
}

.blue{
    background:#2f80ed;
    color:white;
}

.yellow{
    background:#f2c319;
    color:black;
}

.btn:hover{
    transform:translateY(-5px);
}

/* SECTION */
.section{
    padding:40px 10% 80px 10%;
    background:transparent;
}

.section h2{
    font-size:45px;
    color:brown;
    margin-bottom:20px;
}

.section p{
    font-size:20px;
    line-height:1.8;
    color:#333;
}

/* FEES SECTION */
.fees-section{
    padding:70px 10%;
    background:white;
    text-align:center;
}

.fees-title{
    font-size:50px;
    color:#2f80ed;
    margin-bottom:40px;
    font-weight:bold;
}

.fees-card{
    max-width:700px;
    margin:auto;
    background:#f8f9fa;
    padding:45px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.fees-card h3{
    font-size:35px;
    color:#ff006e;
    margin-bottom:30px;
}

.fees-card p{
    font-size:26px;
    color:#333;
    margin-bottom:25px;
    font-weight:bold;
}

.qr-title{
    font-size:30px;
    color:#2f80ed;
    margin-top:20px;
    margin-bottom:20px;
}

.qr-img{
    width:300px;
    max-width:100%;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* NAVIGATION */
.nav-auth{
    background: linear-gradient(135deg, rgba(47, 128, 237, 0.2), rgba(242, 195, 25, 0.1));
    padding: 15px 10%;
    text-align: center;
    border-top: 1px solid rgba(47, 128, 237, 0.3);
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-transparent">
    <img src="444.png" alt="Logo">
</div>

<!-- HERO SECTION -->
<section class="hero">

<div class="hero-content">

<h1>The #1 Robotics<br>Education Platform</h1>

<p>
<i>
<b>
Learn Robotics & AI, Arduino & Future Technology
with live practical projects.
</b>
</i>
</p>

<div class="buttons">
<a href="ss.html" class="btn blue">Explore More</a>

<a href="contact-page/index.html" class="btn yellow">
Contact Us
</a>
</div>

<!-- WAVE -->
<div style="
position:absolute;
left:0;
right:0;
bottom:-1px;
width:100%;
line-height:0;
z-index:2;
">

<svg
viewBox="0 0 1440 120"
width="100%"
height="90"
preserveAspectRatio="none"
style="display:block;">

<path
d="M0,50
C60,90 120,90 180,50
C240,10 300,10 360,50
C420,90 480,90 540,50
C600,10 660,10 720,50
C780,90 840,90 900,50
C960,10 1020,10 1080,50
C1140,90 1200,90 1260,50
C1320,10 1380,10 1440,50
L1440,120
L0,120
Z"

fill="#ffffff"/>

</svg>
</div>

</div>
</section>

<!-- NAVIGATION -->
<div class="nav-auth">

<div id="authNav" style="display:none;">
<span style="color:#333;font-weight:bold;">
Welcome, <span id="userName">User</span>!
</span>

<a href="index.html"
onclick="logoutUser(); return false;"
style="
margin-left:20px;
padding:8px 16px;
background:#2f80ed;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:600;
">
Logout
</a>
</div>

<div id="loginNav">
<a href="index.html"
style="
margin:0 10px;
color:#2f80ed;
text-decoration:none;
font-weight:600;
">
Login
</a>

<a href="register.html"
style="
margin:0 10px;
padding:8px 16px;
background:#2f80ed;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:600;
">
Register
</a>
</div>

</div>

<!-- FEES STRUCTURE SECTION -->
<section class="fees-section">

<h2 class="fees-title">
Fees Structure
</h2>

<div class="fees-card">

<h3>
Registration & Fees
</h3>

<p>
Registration Kit Price: ₹600
</p>

<p>
Monthly Fees: ₹600
</p>

<h3 class="qr-title">
Scan QR Code To Pay
</h3>

<img src="bvbv.jpeg" alt="QR Code" class="qr-img">

</div>

</section>

<!-- SCRIPT -->
<script src="interactive-elements.js"></script>

<script>

document.addEventListener('DOMContentLoaded', () => {

    const user = sessionStorage.getItem('loggedInUser');

    if (user) {

        const userData = JSON.parse(user);

        document.getElementById('authNav').style.display = 'block';

        document.getElementById('loginNav').style.display = 'none';

        document.getElementById('userName').textContent =
        userData.identifier || 'User';

    } else {

        document.getElementById('authNav').style.display = 'none';

        document.getElementById('loginNav').style.display = 'block';

    }

});

function logoutUser() {

    if (confirm('Are you sure you want to logout?')) {

        sessionStorage.removeItem('loggedInUser');

        localStorage.removeItem('rememberMe');

        window.location.href = 'index.html';

    }

}

</script>

</body>
</html>
