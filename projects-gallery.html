<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Gallery - RoboLearn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
        }

        .gallery-header {
            max-width: 1200px;
            margin: 0 auto 40px;
            text-align: center;
            color: white;
        }

        .gallery-header h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .gallery-header p {
            font-size: 1.2em;
            margin-bottom: 20px;
            opacity: 0.95;
        }

        .gallery-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .gallery-controls button,
        .gallery-controls input {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #333;
            font-weight: 600;
        }

        .gallery-controls input {
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid white;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .gallery-controls input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .gallery-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .gallery-controls button.active {
            background: #667eea;
            color: white;
        }

        .upload-button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .upload-button:hover {
            transform: translateY(-2px);
        }

        .gallery-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .project-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.5s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .project-header h3 {
            font-size: 1.3em;
            margin: 0 0 8px 0;
            word-break: break-word;
        }

        .project-uploader {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .project-uploader i {
            margin-right: 5px;
        }

        .project-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-description {
            color: #555;
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 15px;
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .project-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #888;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-actions {
            display: flex;
            gap: 10px;
        }

        .download-btn,
        .view-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .download-btn:hover {
            transform: translateX(2px);
        }

        .view-btn {
            background: #f0f2ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .view-btn:hover {
            background: #e8ebff;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 30px;
            text-align: center;
            color: #666;
        }

        .empty-state i {
            font-size: 4em;
            color: #ddd;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state p {
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .empty-state a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .empty-state a:hover {
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .sorting-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .gallery-header h1 {
                font-size: 1.8em;
            }

            .gallery-controls {
                flex-direction: column;
            }

            .gallery-controls input {
                min-width: 100%;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .project-card {
                flex-direction: row;
            }

            .project-header {
                flex: 0 0 150px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <!-- Header -->
        <div class="gallery-header">
            <h1><i class="fas fa-gallery"></i> Projects Gallery</h1>
            <p>Explore amazing projects from our community</p>
        </div>

        <!-- Stats -->
        <div class="gallery-content">
            <div class="stats-bar">
                <span id="projectCount">Loading projects...</span>
            </div>

            <!-- Controls -->
            <div class="gallery-controls">
                <input type="text" id="searchInput" placeholder="Search projects by name or uploader...">
                <button class="upload-button" onclick="window.location.href='/upload-project'">
                    <i class="fas fa-cloud-upload-alt"></i> Upload Project
                </button>
            </div>

            <!-- Sorting -->
            <div style="text-align: center; margin-bottom: 25px;">
                <div class="sorting-options" style="justify-content: center;">
                    <button class="sort-btn" onclick="sortProjects('newest')" id="sortNewest">
                        <i class="fas fa-arrow-down"></i> Newest First
                    </button>
                    <button class="sort-btn" onclick="sortProjects('oldest')" id="sortOldest">
                        <i class="fas fa-arrow-up"></i> Oldest First
                    </button>
                    <button class="sort-btn" onclick="sortProjects('name')" id="sortName">
                        <i class="fas fa-sort-alpha-down"></i> A to Z
                    </button>
                </div>
            </div>

            <!-- Projects Grid -->
            <div id="loadingState" class="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px;">Loading projects...</p>
            </div>

            <div id="projectsGrid" class="projects-grid" style="display: none;"></div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h2>No Projects Yet</h2>
                <p>Be the first to share your amazing project!</p>
                <a href="/upload-project">
                    <i class="fas fa-cloud-upload-alt"></i> Upload Your Project
                </a>
            </div>
        </div>
    </div>

    <script>
        let allProjects = [];
        let sortOrder = 'newest';

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays === 1) return 'Today';
            if (diffDays === 2) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            if (diffDays < 365) return `${Math.floor(diffDays / 30)} months ago`;

            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        // Get file size format
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        // Load projects
        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                const data = await response.json();

                if (response.ok) {
                    allProjects = data.projects || [];
                    renderProjects();
                    updateStats();
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                showEmptyState();
            }
        }

        // Render projects
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');

            loadingState.style.display = 'none';

            if (allProjects.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            grid.innerHTML = allProjects.map(project => `
                <div class="project-card">
                    <div class="project-header">
                        <h3 title="${project.projectName}">${project.projectName}</h3>
                        <div class="project-uploader">
                            <i class="fas fa-user"></i> ${project.uploaderName}
                        </div>
                    </div>
                    <div class="project-body">
                        <div class="project-description">${project.description || 'No description provided'}</div>
                        <div class="project-meta">
                            <div class="meta-item">
                                <i class="fas fa-calendar"></i>
                                <span>${formatDate(project.uploadDate)}</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-file"></i>
                                <span>${formatFileSize(project.fileSize)}</span>
                            </div>
                        </div>
                        <div class="project-actions">
                            <a href="${project.downloadUrl}" class="download-btn" download>
                                <i class="fas fa-download"></i> Download
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Show empty state
        function showEmptyState() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('projectsGrid').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        }

        // Update stats
        function updateStats() {
            const count = allProjects.length;
            document.getElementById('projectCount').textContent = 
                `${count} ${count === 1 ? 'project' : 'projects'} uploaded by our community`;
        }

        // Sort projects
        function sortProjects(order) {
            sortOrder = order;

            // Update button styles
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.style.background = 'white';
                btn.style.color = '#333';
            });

            if (order === 'newest') {
                allProjects.sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate));
                document.getElementById('sortNewest').style.background = '#667eea';
                document.getElementById('sortNewest').style.color = 'white';
            } else if (order === 'oldest') {
                allProjects.sort((a, b) => new Date(a.uploadDate) - new Date(b.uploadDate));
                document.getElementById('sortOldest').style.background = '#667eea';
                document.getElementById('sortOldest').style.color = 'white';
            } else if (order === 'name') {
                allProjects.sort((a, b) => a.projectName.localeCompare(b.projectName));
                document.getElementById('sortName').style.background = '#667eea';
                document.getElementById('sortName').style.color = 'white';
            }

            renderProjects();
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allProjects.filter(project =>
                project.projectName.toLowerCase().includes(searchTerm) ||
                project.uploaderName.toLowerCase().includes(searchTerm) ||
                (project.description && project.description.toLowerCase().includes(searchTerm))
            );

            const grid = document.getElementById('projectsGrid');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                emptyState.innerHTML = `
                    <i class="fas fa-search"></i>
                    <h2>No Results Found</h2>
                    <p>Try a different search term</p>
                `;
            } else {
                grid.style.display = 'grid';
                emptyState.style.display = 'none';
                grid.innerHTML = filtered.map(project => `
                    <div class="project-card">
                        <div class="project-header">
                            <h3 title="${project.projectName}">${project.projectName}</h3>
                            <div class="project-uploader">
                                <i class="fas fa-user"></i> ${project.uploaderName}
                            </div>
                        </div>
                        <div class="project-body">
                            <div class="project-description">${project.description || 'No description provided'}</div>
                            <div class="project-meta">
                                <div class="meta-item">
                                    <i class="fas fa-calendar"></i>
                                    <span>${formatDate(project.uploadDate)}</span>
                                </div>
                                <div class="meta-item">
                                    <i class="fas fa-file"></i>
                                    <span>${formatFileSize(project.fileSize)}</span>
                                </div>
                            </div>
                            <div class="project-actions">
                                <a href="${project.downloadUrl}" class="download-btn" download>
                                    <i class="fas fa-download"></i> Download
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        });

        // Load projects on page load
        window.addEventListener('load', loadProjects);

        // Auto-refresh every 30 seconds
        setInterval(loadProjects, 30000);
    </script>
</body>
</html>
