<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - RoboLearn</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Main Container -->
    <div class="login-container register-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-robot"></i>
            </div>
            <h1>RoboLearn</h1>
            <p>Master Technology & Innovation</p>
        </div>

        <!-- Registration Card -->
        <div class="login-card register-card">
            <!-- Header -->
            <div class="card-header">
                <h2>Create Account</h2>
                <p>Join our learning community and start your journey</p>
            </div>

            <!-- Registration Form -->
            <form id="registerForm" class="login-form register-form">
                <!-- Full Name Field -->
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            placeholder="Enter your full name"
                            required
                        >
                    </div>
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="registerEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="registerEmail" 
                            name="registerEmail" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                    <span class="error-message" id="registerEmailError"></span>
                </div>

                <!-- Phone Number Field -->
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input 
                            type="tel" 
                            id="phoneNumber" 
                            name="phoneNumber" 
                            placeholder="Enter your phone number"
                            required
                        >
                    </div>
                    <span class="error-message" id="phoneNumberError"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="registerPassword" 
                            name="registerPassword" 
                            placeholder="At least 8 characters"
                            required
                        >
                        <!-- Show/Hide Password Button -->
                        <button type="button" class="toggle-password" id="toggleRegisterPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="password-requirements" id="passwordRequirements">
                        <i class="fas fa-info-circle"></i>
                        <span id="requirementText">Password must contain: 8+ characters, letters and numbers</span>
                    </span>
                    <span class="error-message" id="registerPasswordError"></span>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm your password"
                            required
                        >
                        <!-- Show/Hide Password Button -->
                        <button type="button" class="toggle-password" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <!-- Terms & Conditions -->
                <div class="form-footer">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms">I agree to the Terms & Conditions</label>
                    </div>
                    <span class="error-message" id="termsError"></span>
                </div>

                <!-- Register Button -->
                <button type="submit" class="login-btn">
                    <span class="btn-text">Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                    <span class="loading-spinner"></span>
                </button>

                <!-- Success Message -->
                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i>
                    <span>Account created successfully! Redirecting to login...</span>
                </div>
            </form>

            <!-- Already have account -->
            <div class="already-account">
                <p>Already have an account? <a href="index.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Register Script -->
    <script src="register.js"></script>
</body>
</html>
