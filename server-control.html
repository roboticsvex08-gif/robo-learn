<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Control Panel - RoboLearn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-box {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .status-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-text {
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background: #51cf66;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .info-section {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }

        .info-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-section p {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 15px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-server"></i> Server Control</h1>
            <p>RoboLearn Server Management Panel</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="status-box">
            <div class="status-label">Server Status</div>
            <div class="status-text">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="statusText">Offline</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="startBtn" onclick="startServer()">
                <i class="fas fa-play"></i> Start Server
            </button>
            <button class="btn btn-danger" id="stopBtn" onclick="stopServer()" disabled>
                <i class="fas fa-stop"></i> Stop Server
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">Processing...</p>
        </div>

        <div class="info-section">
            <h3><i class="fas fa-info-circle"></i> Information</h3>
            <p><strong>Server Port:</strong> 8000</p>
            <p><strong>Base URL:</strong> http://localhost:8000</p>
            <p id="serverUrl" style="display: none;">
                <strong>Access Server:</strong> 
                <a href="http://localhost:8000" target="_blank" style="color: #667eea; text-decoration: none;">Open in Browser</a>
            </p>
            <p style="margin-top: 10px; font-size: 12px; color: #999;">
                Click "Start Server" to launch the Python HTTP server on port 8000.
            </p>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        function showAlert(message, type = 'info') {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert show alert-${type}`;
            
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }

        function setLoading(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
            document.getElementById('startBtn').disabled = isLoading;
            document.getElementById('stopBtn').disabled = isLoading || !isServerRunning();
        }

        function updateStatus(isRunning) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const serverUrl = document.getElementById('serverUrl');

            if (isRunning) {
                indicator.classList.add('active');
                statusText.textContent = 'Online';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                serverUrl.style.display = 'block';
            } else {
                indicator.classList.remove('active');
                statusText.textContent = 'Offline';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                serverUrl.style.display = 'none';
            }
        }

        function isServerRunning() {
            return document.getElementById('statusIndicator').classList.contains('active');
        }

        async function startServer() {
            setLoading(true);
            try {
                const response = await fetch(`${BASE_URL}/api/start-server`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✓ Server started successfully!', 'success');
                    updateStatus(true);
                    // Check server availability
                    setTimeout(checkServerStatus, 2000);
                } else {
                    showAlert('✗ Error: ' + (data.error || 'Failed to start server'), 'error');
                }
            } catch (error) {
                showAlert('✗ Connection error. Make sure the control server is running.', 'error');
                console.error('Error:', error);
            } finally {
                setLoading(false);
            }
        }

        async function stopServer() {
            if (!confirm('Are you sure you want to stop the server?')) return;

            setLoading(true);
            try {
                const response = await fetch(`${BASE_URL}/api/stop-server`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✓ Server stopped successfully!', 'success');
                    updateStatus(false);
                } else {
                    showAlert('✗ Error: ' + (data.error || 'Failed to stop server'), 'error');
                }
            } catch (error) {
                showAlert('✗ Connection error.', 'error');
                console.error('Error:', error);
            } finally {
                setLoading(false);
            }
        }

        async function checkServerStatus() {
            try {
                const response = await fetch('http://localhost:8000', {
                    method: 'HEAD',
                    mode: 'no-cors'
                });
                updateStatus(true);
            } catch (error) {
                updateStatus(false);
            }
        }

        // Check status on page load
        window.addEventListener('load', () => {
            checkServerStatus();
            // Check every 5 seconds
            setInterval(checkServerStatus, 5000);
        });
    </script>
</body>
</html>
